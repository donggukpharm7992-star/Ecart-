<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=5.0, user-scalable=yes" />
    <meta name="theme-color" content="#f97316" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="비품점검" />
    <script>
      (() => {
        const version = "20260710b";
        const assetBase = "/Ecart-/";
        const normalizedPath = window.location.pathname.replace(/\/+$/, "");
        const isNarcoticViewer = normalizedPath.endsWith("/narcotic-viewer");
        const isPharmacyViewer = normalizedPath.endsWith("/pharmacy-viewer");
        const isViewer = normalizedPath.endsWith("/viewer");
        const metadata = isNarcoticViewer
          ? {
              manifest: "narcotic-viewer.webmanifest",
              icon: "icons/narcotic-icon-192.png",
              title: "비치마약류 관리",
              theme: "#b91c1c",
            }
          : isPharmacyViewer
          ? {
              manifest: "pharmacy-viewer.webmanifest",
              icon: "icons/app-icon-192.png",
              title: "약제팀 라벨 마스터 관리",
              theme: "#f97316",
            }
          : isViewer
          ? {
              manifest: "viewer.webmanifest",
              icon: "icons/viewer-icon-192.png",
              title: "병동 약품 라벨 마스터관리",
              theme: "#f97316",
            }
          : {
              manifest: "manifest.webmanifest",
              icon: "icons/app-icon-192.png",
              title: "비품점검",
              theme: "#f97316",
            };

        document.querySelector('meta[name="theme-color"]')?.setAttribute("content", metadata.theme);
        document.querySelector('meta[name="apple-mobile-web-app-title"]')?.setAttribute("content", metadata.title);
        document.title = metadata.title;

        const manifest = document.createElement("link");
        manifest.rel = "manifest";
        manifest.href = `${assetBase}${metadata.manifest}?v=${version}`;
        document.head.appendChild(manifest);

        const icon = document.createElement("link");
        icon.rel = "icon";
        icon.type = "image/png";
        icon.href = `${assetBase}${metadata.icon}?v=${version}`;
        document.head.appendChild(icon);

        const appleIcon = document.createElement("link");
        appleIcon.rel = "apple-touch-icon";
        appleIcon.href = `${assetBase}${metadata.icon}?v=${version}`;
        document.head.appendChild(appleIcon);
      })();
    </script>
    <title>약사용 병동 비품관리</title>
    <script type="module" crossorigin src="/Ecart-/assets/index-BcUysIgD.js?v=20260713a"></script>
    <link rel="stylesheet" crossorigin href="/Ecart-/assets/index-Ct3VjHW_.css?v=20260713a">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
